<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VarezHub Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e63946;
    --accent2: #ff6b6b;
    --gold: #ffd60a;
    --text: #e8e8f0;
    --muted: #555570;
    --green: #2ec27e;
    --red: #e63946;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(230,57,70,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(230,57,70,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 20px; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    margin-bottom: 24px;
    animation: slideDown 0.4s ease;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; letter-spacing: 2px; }
  .logo span { color: var(--accent); }
  .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  .status-text { font-size: 0.7rem; color: var(--muted); }

  /* Stats Grid */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .stat-card:nth-child(2)::before { background: var(--green); }
  .stat-card:nth-child(3)::before { background: var(--red); }
  .stat-card:nth-child(4)::before { background: var(--gold); }
  .stat-card:nth-child(5)::before { background: #7b5ea7; }
  .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; }
  .stat-card:nth-child(2) .stat-value { color: var(--green); }
  .stat-card:nth-child(3) .stat-value { color: var(--red); }
  .stat-card:nth-child(4) .stat-value { color: var(--gold); }
  .stat-card:nth-child(5) .stat-value { color: #7b5ea7; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); padding: 4px; }
  .tab {
    flex: 1; padding: 10px; text-align: center;
    font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; color: var(--muted); transition: all 0.2s;
    border: 1px solid transparent;
  }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); border-color: var(--border); }

  /* Panels */
  .panel { display: none; animation: fadeUp 0.3s ease; }
  .panel.active { display: block; }

  /* Section */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .section-header {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header::before {
    content: '//';
    color: var(--accent);
    font-weight: 700;
  }
  .section-body { padding: 18px; }

  /* Search */
  .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
  input[type="text"], input[type="number"], textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }

  /* Buttons */
  .btn {
    padding: 10px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 1px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-success { background: var(--green); color: #000; }
  .btn-success:hover { opacity: 0.85; }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn-danger:hover { background: var(--red); color: white; }
  .btn-warn { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
  .btn-warn:hover { background: var(--gold); color: #000; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Action grid */
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .action-box { background: var(--bg); border: 1px solid var(--border); padding: 14px; }
  .action-box label { display: block; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .action-row { display: flex; gap: 6px; margin-top: 8px; }

  /* User Table */
  .user-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
  .user-table th { text-align: left; padding: 8px 12px; color: var(--muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
  .user-table td { padding: 10px 12px; border-bottom: 1px solid #141420; }
  .user-table tr:hover td { background: rgba(230,57,70,0.04); }
  .badge { padding: 2px 8px; font-size: 0.6rem; font-weight: 700; letter-spacing: 1px; }
  .badge-active { background: rgba(46,194,126,0.15); color: var(--green); }
  .badge-banned { background: rgba(230,57,70,0.15); color: var(--red); }

  /* Log table */
  .log-table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
  .log-table th { text-align: left; padding: 8px 12px; color: var(--muted); font-size: 0.6rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .log-table td { padding: 9px 12px; border-bottom: 1px solid #141420; }
  .log-table tr:hover td { background: rgba(230,57,70,0.04); }

  /* Alert */
  .alert {
    padding: 12px 16px;
    font-size: 0.75rem;
    margin-bottom: 12px;
    border-left: 3px solid;
    display: none;
  }
  .alert.show { display: block; animation: fadeUp 0.3s ease; }
  .alert-success { background: rgba(46,194,126,0.1); border-color: var(--green); color: var(--green); }
  .alert-error { background: rgba(230,57,70,0.1); border-color: var(--red); color: var(--red); }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 0.75rem; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }

  /* Broadcast */
  .broadcast-box { display: flex; flex-direction: column; gap: 10px; }

  /* Animations */
  @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .action-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .tabs { flex-wrap: wrap; }
    .tab { flex: none; width: 48%; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">VAREZ<span>HUB</span> <span style="color:var(--muted);font-size:0.7rem">// ADMIN</span></div>
    <div>
      <span class="status-dot"></span>
      <span class="status-text" id="statusText">BAĞLANIYOR...</span>
    </div>
  </header>

  <!-- Alert -->
  <div class="alert" id="globalAlert"></div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card" style="animation-delay:0.05s">
      <div class="stat-label">Toplam Üye</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-card" style="animation-delay:0.1s">
      <div class="stat-label">Aktif</div>
      <div class="stat-value" id="statActive">—</div>
    </div>
    <div class="stat-card" style="animation-delay:0.15s">
      <div class="stat-label">Banlı</div>
      <div class="stat-value" id="statBanned">—</div>
    </div>
    <div class="stat-card" style="animation-delay:0.2s">
      <div class="stat-label">Toplam Satış</div>
      <div class="stat-value" id="statSales">—</div>
    </div>
    <div class="stat-card" style="animation-delay:0.25s">
      <div class="stat-label">Toplam Gelir</div>
      <div class="stat-value" id="statRevenue">—</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('users')">👥 Kullanıcılar</div>
    <div class="tab" onclick="switchTab('actions')">⚡ İşlemler</div>
    <div class="tab" onclick="switchTab('broadcast')">📢 Duyuru</div>
    <div class="tab" onclick="switchTab('logs')">📦 Satış Log</div>
  </div>

  <!-- USERS TAB -->
  <div class="panel active" id="tab-users">
    <div class="section">
      <div class="section-header">Kullanıcı Listesi</div>
      <div class="section-body">
        <div class="search-row">
          <input type="text" id="searchInput" placeholder="İsim veya ID ara..." oninput="searchUsers(this.value)">
          <button class="btn btn-ghost" onclick="loadUsers()">Yenile</button>
        </div>
        <div id="usersContainer">
          <div class="loading"><span class="spinner"></span>Yükleniyor...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ACTIONS TAB -->
  <div class="panel" id="tab-actions">
    <div class="section">
      <div class="section-header">Kullanıcı İşlemleri</div>
      <div class="section-body">
        <div class="action-grid">

          <div class="action-box">
            <label>🚫 Ban / ✅ Unban</label>
            <input type="text" id="banUid" placeholder="Kullanıcı ID">
            <div class="action-row">
              <button class="btn btn-danger" onclick="doAction('ban')">BAN</button>
              <button class="btn btn-success" onclick="doAction('unban')">UNBAN</button>
            </div>
          </div>

          <div class="action-box">
            <label>💰 Ref Ekle / Sil</label>
            <input type="text" id="refUid" placeholder="Kullanıcı ID">
            <input type="number" id="refAmount" placeholder="Miktar" style="margin-top:6px">
            <div class="action-row">
              <button class="btn btn-success" onclick="doAction('addref')">+ EKLE</button>
              <button class="btn btn-danger" onclick="doAction('remref')">- SİL</button>
            </div>
          </div>

          <div class="action-box">
            <label>🗑️ Kullanıcı Sil</label>
            <input type="text" id="delUid" placeholder="Kullanıcı ID">
            <div class="action-row">
              <button class="btn btn-danger" onclick="doAction('deluser')">SİL</button>
            </div>
          </div>

          <div class="action-box">
            <label>🔍 Kullanıcı Ara</label>
            <input type="text" id="findUid" placeholder="Kullanıcı ID">
            <div class="action-row">
              <button class="btn btn-primary" onclick="doAction('finduser')">ARA</button>
            </div>
            <div id="findResult" style="margin-top:10px;font-size:0.7rem;color:var(--muted)"></div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- BROADCAST TAB -->
  <div class="panel" id="tab-broadcast">
    <div class="section">
      <div class="section-header">Tüm Üyelere Duyuru</div>
      <div class="section-body">
        <div class="broadcast-box">
          <textarea id="broadcastMsg" placeholder="Duyuru mesajını buraya yaz..."></textarea>
          <button class="btn btn-primary" id="broadcastBtn" onclick="sendBroadcast()">📢 GÖNDER</button>
          <div id="broadcastResult" style="font-size:0.75rem;color:var(--muted)"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- LOGS TAB -->
  <div class="panel" id="tab-logs">
    <div class="section">
      <div class="section-header">Satış Logları</div>
      <div class="section-body">
        <div id="logsContainer">
          <div class="loading"><span class="spinner"></span>Yükleniyor...</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  // =====================================================
  // AYARLAR — Railway API URL'ini buraya yaz
  // =====================================================
  // Otomatik — Railway'den serve edildiği için same-origin
  const API = window.location.origin;

  const USER_ID = (() => {
    try { return window.Telegram?.WebApp?.initDataUnsafe?.user?.id || ""; }
    catch { return ""; }
  })();

  const headers = {
    "Content-Type": "application/json",
    "X-User-Id": USER_ID
  };

  // =====================================================
  // ALERT
  // =====================================================
  function showAlert(msg, type = "success") {
    const el = document.getElementById("globalAlert");
    el.textContent = msg;
    el.className = `alert alert-${type} show`;
    setTimeout(() => el.classList.remove("show"), 3500);
  }

  // =====================================================
  // STATS
  // =====================================================
  async function loadStats() {
    try {
      const r = await fetch(`${API}/api/stats`, { headers });
      const d = await r.json();
      document.getElementById("statTotal").textContent = d.total ?? "—";
      document.getElementById("statActive").textContent = d.active ?? "—";
      document.getElementById("statBanned").textContent = d.banned ?? "—";
      document.getElementById("statSales").textContent = d.sales ?? "—";
      document.getElementById("statRevenue").textContent = (d.revenue ?? "—") + " Ref";
      document.getElementById("statusText").textContent = "BAĞLANDI ✓";
    } catch {
      document.getElementById("statusText").textContent = "BAĞLANTI YOK ✗";
    }
  }

  // =====================================================
  // USERS
  // =====================================================
  let allUsers = [];

  async function loadUsers() {
    document.getElementById("usersContainer").innerHTML = '<div class="loading"><span class="spinner"></span>Yükleniyor...</div>';
    try {
      const r = await fetch(`${API}/api/users`, { headers });
      allUsers = await r.json();
      renderUsers(allUsers);
    } catch {
      document.getElementById("usersContainer").innerHTML = '<div class="loading">❌ Yüklenemedi. API bağlantısını kontrol et.</div>';
    }
  }

  function renderUsers(users) {
    if (!users.length) {
      document.getElementById("usersContainer").innerHTML = '<div class="loading">Kullanıcı bulunamadı.</div>';
      return;
    }
    let html = `<table class="user-table">
      <thead><tr>
        <th>ID</th><th>İSİM</th><th>REF</th><th>DAVETİYE</th><th>DURUM</th><th>İŞLEM</th>
      </tr></thead><tbody>`;
    for (const u of users) {
      const badge = u.banned
        ? '<span class="badge badge-banned">BANLI</span>'
        : '<span class="badge badge-active">AKTİF</span>';
      const banBtn = u.banned
        ? `<button class="btn btn-success" style="padding:4px 10px;font-size:0.6rem" onclick="quickAction('unban',${u.id})">UNBAN</button>`
        : `<button class="btn btn-danger" style="padding:4px 10px;font-size:0.6rem" onclick="quickAction('ban',${u.id})">BAN</button>`;
      html += `<tr>
        <td><code>${u.id}</code></td>
        <td>${u.first_name || '—'}</td>
        <td style="color:var(--gold)">${u.ref}</td>
        <td>${u.davet_sayisi}</td>
        <td>${badge}</td>
        <td>${banBtn}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    document.getElementById("usersContainer").innerHTML = html;
  }

  function searchUsers(q) {
    q = q.toLowerCase();
    if (!q) { renderUsers(allUsers); return; }
    const filtered = allUsers.filter(u =>
      String(u.id).includes(q) || (u.first_name || '').toLowerCase().includes(q)
    );
    renderUsers(filtered);
  }

  async function quickAction(action, uid) {
    try {
      const r = await fetch(`${API}/api/${action}`, {
        method: "POST", headers,
        body: JSON.stringify({ user_id: uid })
      });
      const d = await r.json();
      if (d.success) { showAlert(`✅ ${d.name} — işlem başarılı`); loadUsers(); loadStats(); }
      else showAlert(d.error, "error");
    } catch { showAlert("❌ Bağlantı hatası", "error"); }
  }

  // =====================================================
  // ACTIONS
  // =====================================================
  async function doAction(action) {
    let uid, amount, endpoint, body;

    if (action === "ban" || action === "unban") {
      uid = document.getElementById("banUid").value.trim();
      if (!uid) { showAlert("❌ ID gir", "error"); return; }
      endpoint = action; body = { user_id: parseInt(uid) };
    } else if (action === "addref" || action === "remref") {
      uid = document.getElementById("refUid").value.trim();
      amount = parseInt(document.getElementById("refAmount").value);
      if (!uid || !amount) { showAlert("❌ ID ve miktar gir", "error"); return; }
      endpoint = action; body = { user_id: parseInt(uid), amount };
    } else if (action === "deluser") {
      uid = document.getElementById("delUid").value.trim();
      if (!uid) { showAlert("❌ ID gir", "error"); return; }
      if (!confirm(`${uid} silinsin mi?`)) return;
      endpoint = action; body = { user_id: parseInt(uid) };
    } else if (action === "finduser") {
      uid = document.getElementById("findUid").value.trim();
      if (!uid) { showAlert("❌ ID gir", "error"); return; }
      try {
        const r = await fetch(`${API}/api/users/${uid}`, { headers });
        const d = await r.json();
        if (d.error) { document.getElementById("findResult").textContent = "❌ " + d.error; return; }
        document.getElementById("findResult").innerHTML =
          `🆔 ${d.id}<br>👤 ${d.first_name}<br>💰 ${d.ref} Ref<br>👥 ${d.davet_sayisi} Davet<br>📊 ${d.banned ? "🚫 Banlı" : "✅ Aktif"}`;
      } catch { showAlert("❌ Bağlantı hatası", "error"); }
      return;
    }

    try {
      const r = await fetch(`${API}/api/${endpoint}`, {
        method: "POST", headers,
        body: JSON.stringify(body)
      });
      const d = await r.json();
      if (d.success) { showAlert(`✅ ${d.name || uid} — işlem tamam`); loadUsers(); loadStats(); }
      else showAlert(d.error || "Hata", "error");
    } catch { showAlert("❌ Bağlantı hatası", "error"); }
  }

  // =====================================================
  // BROADCAST
  // =====================================================
